<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Django Blog</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #e0f7fa, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar{
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }

        .navbar-brand{
            font-weight: bold;
            font-size: 22px;
        }

        /* Blog Cards */
        .blog-card{
            border-radius: 12px;
            padding: 20px;
            background: #ffffff;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .blog-card:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .blog-title{
            font-weight: 600;
        }

        .blog-desc{
            color: #555;
        }

        /* Header Section */
        .page-header{
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1{
            font-weight: bold;
        }

        /* Footer */
        .footer{
            background: #212529;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }

    </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">My Django Blog</a>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">

    <div class="page-header">
        <h1>Welcome to My Blog</h1>
        <p class="text-muted">Sharing knowledge, ideas and experiences</p>
    </div>

    {% block content %}
    {% endblock %}

</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 My Django Blog | Built with Django</p>
</div>

</body>

</html>
